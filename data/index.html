<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Weather Station</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">T3 V1.6.1</p>
      <h1>Weather Station</h1>
    </div>
    <nav class="menu">
      <button id="menuButton" type="button" aria-expanded="false">MENU</button>
      <div id="menuPanel" class="menu-panel hidden">
        <button type="button" data-view="dashboard">Dashboard</button>
        <button type="button" data-view="admin">Admin</button>
      </div>
    </nav>
  </header>

  <main>
    <section id="dashboardView" class="view">
      <div class="status-strip">
        <span id="solarMode">MODE --</span>
        <span id="wifiState">WIFI --</span>
        <span id="postState">POST --</span>
      </div>
      <section class="grid" id="displayGrid"></section>
    </section>

    <section id="adminView" class="view hidden">
      <header class="view-header">
        <h2>Admin</h2>
        <span id="adminState">Locked</span>
      </header>

      <form id="loginForm" class="login-row">
        <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Password">
        <button type="submit">Unlock</button>
      </form>

      <div id="adminPanel" class="admin-panel hidden">
        <form id="configForm">

          <!-- WiFi -->
          <div class="admin-section">
            <h3>WiFi</h3>
            <div class="config-grid">
              <label>SSID<input name="wifiSsid" maxlength="32" autocomplete="off"></label>
              <label>Password<input name="wifiPassword" type="password" maxlength="64" placeholder="leave blank to keep" autocomplete="new-password"></label>
            </div>
            <div class="scan-bar">
              <button type="button" id="scanWifi">Scan Networks</button>
              <span id="scanStatus" class="scan-status"></span>
            </div>
            <div id="networkList" class="network-list"></div>
          </div>

          <!-- Server Post -->
          <div class="admin-section">
            <h3>Server Post</h3>
            <div class="config-grid">
              <label class="check wide"><input name="serverPostEnabled" type="checkbox"> Enabled</label>
              <label class="wide">URL<input name="postUrl" maxlength="160" autocomplete="off"></label>
              <label class="wide">Token<input name="postToken" type="password" maxlength="96" placeholder="leave blank to keep" autocomplete="new-password"></label>
              <label>Sun interval ms<input name="serverPostSunMs" type="number" step="1000" min="0"></label>
              <label>Shadow interval ms<input name="serverPostShadowMs" type="number" step="1000" min="0"></label>
              <label>Dark interval ms<input name="serverPostDarkMs" type="number" step="1000" min="60000"></label>
            </div>
          </div>

          <!-- Solar -->
          <div class="admin-section">
            <h3>Solar Thresholds</h3>
            <div class="config-grid">
              <label>Sun enter V<input name="solarSunEnterVoltageV" type="number" step="0.1"></label>
              <label>Sun exit V<input name="solarSunExitVoltageV" type="number" step="0.1"></label>
              <label>Sun min W<input name="solarSunMinPowerW" type="number" step="0.1"></label>
              <label>Dark enter V<input name="solarDarkEnterVoltageV" type="number" step="0.1"></label>
              <label>Dark exit V<input name="solarDarkExitVoltageV" type="number" step="0.1"></label>
            </div>
          </div>

          <!-- Deep Sleep -->
          <div class="admin-section">
            <h3>Deep Sleep</h3>
            <div class="config-grid">
              <label>Dark delay ms<input name="solarDarkDeepSleepDelayMs" type="number" step="1000" min="0"></label>
              <label>Wake ms<input name="solarDeepSleepWakeMs" type="number" step="1000" min="60000"></label>
            </div>
          </div>

          <!-- Security -->
          <div class="admin-section">
            <h3>Security</h3>
            <div class="config-grid">
              <label class="wide">New admin password<input name="newAdminPassword" type="password" maxlength="32" placeholder="leave blank to keep" autocomplete="new-password"></label>
            </div>
          </div>

          <div class="admin-actions">
            <button type="submit">Save All</button>
            <button type="button" id="postNow">Post Now</button>
          </div>

        </form>

        <!-- OTA -->
        <div class="admin-section">
          <h3>OTA Update</h3>
          <div class="ota-grid">
            <form id="otaForm" class="ota">
              <label>Firmware (.bin)<input id="otaFile" name="update" type="file" accept=".bin"></label>
              <button type="submit">Upload Firmware</button>
              <span id="otaState"></span>
            </form>
            <form id="fsOtaForm" class="ota">
              <label>SPIFFS (.bin)<input id="fsOtaFile" name="update" type="file" accept=".bin"></label>
              <button type="submit">Upload SPIFFS</button>
              <span id="fsOtaState"></span>
            </form>
          </div>
        </div>

      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
